<!doctype html>
<html lang="de" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} — deutsch-haufig</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="h-full bg-gray-50 text-gray-900 antialiased">
    <header class="bg-white border-b border-gray-200 shadow-sm">
        <nav class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center gap-3 text-sm">
            <a href="/" class="font-bold text-lg text-blue-700 hover:text-blue-800 tracking-tight">deutsch‑häufig</a>
            <span class="text-gray-300">·</span>
            <a href="/browse" class="text-gray-600 hover:text-blue-700 font-medium transition-colors">Browse</a>
            <span class="text-gray-300">·</span>
            <a href="/learn" class="text-gray-600 hover:text-blue-700 font-medium transition-colors">Learn</a>
        </nav>
    </header>
    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
