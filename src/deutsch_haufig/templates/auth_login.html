{% extends "base.html" %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
    <h1 class="text-2xl font-bold text-stone-900 mb-2">Anmelden</h1>
    <p class="text-sm text-stone-400 mb-6">Gib deine E-Mail ein, um einen magischen Login-Link zu erhalten.</p>

    <form method="post" action="/auth/send-link" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-stone-600 mb-1">E-Mail</label>
            <input type="email" name="email" required autocomplete="email"
                   class="w-full rounded-xl border border-stone-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 bg-stone-50">
        </div>
        <button type="submit"
                class="w-full px-4 py-2.5 rounded-xl bg-brand-600 text-white font-semibold hover:bg-brand-700 transition-colors shadow-sm">
            Login-Link senden
        </button>
    </form>

    {% if not smtp_configured %}
    <p class="mt-4 text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2">
        <strong>Hinweis:</strong> Kein SMTP konfiguriert. Der Link wird auf der Konsole ausgegeben.
    </p>
    {% endif %}
</div>
{% endblock %}
