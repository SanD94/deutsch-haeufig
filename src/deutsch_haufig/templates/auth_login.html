{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-12">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Anmelden</h1>
    <p class="text-sm text-gray-500 mb-6">Gib deine E-Mail-Adresse ein, um einen magischen Login-Link zu erhalten.</p>

    <form method="post" action="/auth/send-link" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">E-Mail</label>
            <input type="email" name="email" required autocomplete="email"
                   class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <button type="submit"
                class="w-full px-4 py-2.5 rounded-lg bg-blue-600 text-white font-semibold hover:bg-blue-700 transition-colors shadow-sm">
            Login-Link senden
        </button>
    </form>

    {% if not smtp_configured %}
    <p class="mt-4 text-xs text-amber-600 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
        <strong>Hinweis:</strong> Kein SMTP konfiguriert. Der Link wird auf der Konsole ausgegeben.
    </p>
    {% endif %}
</div>
{% endblock %}
